    <script type="module">
        (async () => {
            try {
                // Fetch version and force reload if necessary
                const { APP_VERSION } = await import(`./js/version.js?v=${Date.now()}`);
                const v = APP_VERSION;
                
                const storedVersion = localStorage.getItem('app_version');
                if (storedVersion && storedVersion !== APP_VERSION) {
                    localStorage.setItem('app_version', APP_VERSION);
                    window.location.reload(true);
                    return;
                }
                localStorage.setItem('app_version', APP_VERSION);
                
                // Fetch required data
                const { checkAuth, waitForAuth } = await import(`./js/auth.js?v=${v}`);
                await waitForAuth();
                const { syllabusData } = await import(`./js/data/syllabus.js?v=${v}`);

                const params = new URLSearchParams(window.location.search);
                const subject = params.get('id') || 'tamil';
                const paper = params.get('paper');
                const urlClass = params.get('class');

                if (subject.includes('psy')) {
                    document.body.classList.add('psychology-view');
                }

                const titles = {
                    'tamil': 'தமிழ் (Tamil)', 'english': 'English', 'maths': 'கணிதம் (Maths)',
                    'science': paper === '1' ? 'சூழ்நிலையியல் (EVS)' : 'அறிவியல் (Science)',
                    'social': paper === '1' ? 'சமூகவியல் (Social)' : 'சமூக அறிவியல் (Social)',
                    'psychology': 'உளவியல் (Psychology)',
                    'mocktest': 'மாதிரித்தேர்வு (Mock Test)',
                    'revision': 'திருப்புதல் தேர்வு (Revision Test)',
                    'standard_9_10': '9 & 10 பாடங்கள் (Standard 9 & 10)',
                    'standard_9_10_tamil': '9 & 10 தமிழ் (TET Special)',
                    'standard_9_10_english': '9 & 10 English (TET Special)',
                    'standard_9_10_maths': '9 & 10 கணிதம் (TET Special)',
                    'standard_9_10_science': '9 & 10 அறிவியல் (TET Special)',
                    'standard_9_10_social': '9 & 10 சமூக அறிவியல் (TET Special)'
                };

                const titleEl = document.getElementById('subjectTitle');
                const syllabusContainer = document.getElementById('syllabusContainer');
                const classToggleEl = document.getElementById('classToggle');
                const classToggleWrap = document.querySelector('.class-tabs-container');

                let currentClass = null;
                let allowedClasses = ['6', '7', '8'];

                if (['psychology', 'mocktest', 'revision', 'standard_9_10', 'important_notes', 'standard_9_10_tamil', 'standard_9_10_english', 'standard_9_10_maths', 'standard_9_10_science', 'standard_9_10_social'].includes(subject)) allowedClasses = ['all'];
                else if (paper === '1') {
                    if (['tamil', 'english', 'maths'].includes(subject)) allowedClasses = ['1', '2', '3', '4', '5'];
                    else allowedClasses = ['4', '5']; 
                } else if (paper === 'extra') allowedClasses = ['9', '10'];

                // RENDER FUNCTIONS
                const renderLessons = () => {
                    if (!syllabusContainer) return;

                    // SPECIAL CASE: 9 & 10 Unified List (Stacking all subjects)
                    if (subject === 'standard_9_10') {
                        const subSubjects = [
                            { id: 'important_notes', title: 'முக்கிய குறிப்புகள் (Important Notes)', class: 'all' }
                        ];

                        let html = '';
                        subSubjects.forEach(sub => {
                            const data = syllabusData[sub.id]?.[sub.class];
                            if (data && data.length > 0) {
                                html += `<h2 style="color:var(--primary); border-left: 6px solid var(--primary); padding-left: 1rem; margin-top: 4rem; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 800;">${sub.title}</h2>`;
                                
                                data.forEach(term => {
                                    html += `<div class="topics-grid" style="margin-top:1.5rem;">`;
                                    term.units.forEach(unit => {
                                        unit.topics.forEach(topic => {
                                            const isReady = topic.isUpdated;
                                            html += `
                                            <div class="topic-card ${isReady ? '' : 'faded'}" ${isReady ? 'onclick="toggleAccordion(this)"' : ''}>
                                                <div class="topic-title-wrapper">
                                                    <h3 class="topic-title">
                                                        ${topic.title}
                                                        ${isReady ? '' : '<span style="font-size:0.7rem; color:#64748b; margin-left:8px; font-weight:400;">(விரைவில்...)</span>'}
                                                    </h3>
                                                    <div class="chevron">
                                                        ${isReady ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' : '🔒'}
                                                    </div>
                                                </div>
                                                ${isReady ? `
                                                <div class="btn-group">
                                                    <a href="material.html?subject=${sub.id}&class=${sub.class}&lesson=${encodeURIComponent(topic.code || topic.title)}" class="card-btn btn-notes" onclick="event.stopPropagation()">
                                                        பாடக்குறிப்புகள்
                                                    </a>
                                                    <a href="quiz.html?subject=${sub.id}&class=${sub.class}&lesson=${encodeURIComponent(topic.code || topic.title)}" class="card-btn btn-quiz" onclick="event.stopPropagation()">
                                                        தேர்வு
                                                    </a>
                                                </div>` : ''}
                                            </div>`;
                                        });
                                    });
                                    html += `</div>`;
                                });
                            }
                        });
                        syllabusContainer.innerHTML = html;
                        return;
                    }

                    const data = syllabusData[subject]?.[currentClass];
                    
                    if (!data || data.length === 0) {
                        syllabusContainer.innerHTML = `
                        <div style="text-align:center;padding:4rem;color:#64748b;">
                            <div style="font-size:3rem;margin-bottom:1rem;">📂</div>
                            <b style="color:var(--primary);">${currentClass === 'all' ? '' : 'வகுப்பு ' + currentClass} பாடங்கள் இன்னும் பதிவேற்றப்படவில்லை.</b><br>
                            விரைவில் பதிவேற்றப்படும். ${currentClass === 'all' ? '' : '(Class ' + currentClass + ' data pending)'}
                        </div>`;
                        return;
                    }

                    let html = '';
                    data.forEach(term => {
                        const isSpecial = ['revision', 'mocktest'].includes(subject);
                        if (!isSpecial) {
                            const termHeader = term.term === 'Annual' ? 'முழு ஆண்டு (Annual)' : `பருவம் ${term.term} (Term ${term.term})`;
                            html += `
                            <div class="term-section">
                                <h2 style="color:var(--primary); border-left: 6px solid var(--primary); padding-left: 1rem; margin-top: 1rem; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 800;">
                                    ${termHeader}
                                </h2>`;
                        }

                        term.units.forEach(unit => {
                            if (isSpecial) {
                                html += `
                                <div class="term-section">
                                    <h2 style="color:var(--primary); border-left: 6px solid var(--primary); padding-left: 1rem; margin-top: 1rem; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 800;">
                                        ${unit.title}
                                    </h2>
                                    <div class="topics-grid">`;
                            } else {
                                if (unit.title) {
                                    html += `<h3 style="color:var(--secondary); margin: 2.5rem 0 1.5rem; font-size: 1.2rem; font-weight: 700; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem;">${unit.title}</h3>`;
                                }
                                html += `<div class="topics-grid">`;
                            }

                            unit.topics.forEach(topic => {
                                const isReady = topic.isUpdated;
                                const quizUrl = `quiz.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}`;
                                
                                if (subject === 'mocktest') {
                                    // Mock Test Track
                                    const hasMultiMode = topic.quizzes && topic.quizzes.length > 0;
                                    
                                    if (hasMultiMode && isReady) {
                                        // Card that expands to show Material and Test button
                                        html += `
                                        <div class="topic-card" onclick="toggleAccordion(this)">
                                            <div class="topic-title-wrapper" style="padding: 0.5rem 0;">
                                                <h3 class="topic-title" style="color:var(--primary); font-size:1.25rem;">${topic.title}</h3>
                                                <div class="chevron">
                                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                                </div>
                                            </div>
                                            <div class="revision-quiz-container" style="margin-top: 0.5rem;">
                                                <div class="quiz-sub-grid animate-fade-in" style="display: block; width: 100%;">
                                                    ${topic.quizzes.map(q => `
                                                        <div style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #f1f5f9;">
                                                            <div style="font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 0.8rem;">${q.title}</div>
                                                            <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                                                                <a href="quiz.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(q.code)}" class="card-btn btn-quiz" style="justify-content: center;" onclick="event.stopPropagation()">
                                                                    தேர்வு
                                                                </a>
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        </div>`;
                                    } else {
                                        // Single full-card link (for any mocktests without sub-quizzes)
                                        html += `
                                        <div class="topic-card ${isReady ? '' : 'faded'}" ${isReady ? `onclick="toggleAccordion(this)"` : ''}>
                                            <div class="topic-title-wrapper" style="padding: 0.5rem 0;">
                                                <h3 class="topic-title" style="color:var(--primary); font-size:1.25rem;">
                                                    ${topic.title}
                                                    ${isReady ? '' : '<span style="font-size:0.7rem; color:#64748b; margin-left:8px; font-weight:400;">(விரைவில்...)</span>'}
                                                </h3>
                                                <div class="chevron">
                                                    ${isReady ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' : '🔒'}
                                                </div>
                                            </div>
                                            ${isReady ? `
                                            <div class="btn-group">
                                                <a href="${quizUrl}" class="card-btn btn-quiz" onclick="event.stopPropagation()">
                                                    தேர்வு
                                                </a>
                                            </div>` : ''}
                                        </div>`;
                                    }
                                } else {
                                    // Standard / Revision: Notes and Quiz buttons
                                    const hasMultiQuiz = topic.quizzes && topic.quizzes.length > 0;
                                    
                                    html += `
                                    <div class="topic-card ${isReady ? '' : 'faded'}" ${isReady ? 'onclick="toggleAccordion(this)"' : ''}>
                                        <div class="topic-title-wrapper">
                                            <h3 class="topic-title">
                                                ${topic.title}
                                                ${isReady ? '' : '<span style="font-size:0.7rem; color:#64748b; margin-left:8px; font-weight:400;">(விரைவில்...)</span>'}
                                            </h3>
                                            <div class="chevron">
                                                ${isReady ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' : '🔒'}
                                            </div>
                                        </div>
                                        ${isReady ? (hasMultiQuiz ? `
                                        <div class="revision-quiz-container">
                                            <a href="material.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}" class="card-btn btn-notes" style="width:100%; border-radius:12px;" onclick="event.stopPropagation()">
                                                பாடக்குறிப்புகள் (Material)
                                            </a>
                                            <div class="quiz-label-mini">தேர்வுகள் (Quizzes)</div>
                                            <div class="quiz-sub-grid">
                                                ${topic.quizzes.map(q => `
                                                    <a href="quiz.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(q.code)}" class="card-btn btn-quiz quiz-btn-small" onclick="event.stopPropagation()">
                                                        ${q.title}
                                                    </a>
                                                `).join('')}
                                            </div>
                                        </div>
                                        ` : `
                                        <div class="btn-group">
                                            <a href="material.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}" class="card-btn btn-notes" onclick="event.stopPropagation()">
                                                பாடக்குறிப்புகள்
                                            </a>
                                            <a href="${quizUrl}" class="card-btn btn-quiz" onclick="event.stopPropagation()">
                                                தேர்வு
                                            </a>
                                        </div>`) : ''}
                                    </div>`;
                                }
                            });
                            html += `</div>`; // Close topics-grid
                            if (isSpecial) html += `</div>`; // Close term-section
                        });
                        if (!isSpecial) html += `</div>`; // Close term-section
                    });
                    syllabusContainer.innerHTML = html;

                };

                const setupTabs = () => {
                    if (!classToggleEl || ['psychology', 'mocktest', 'revision', 'standard_9_10'].includes(subject)) {
                        if (classToggleWrap) classToggleWrap.style.display = 'none';
                        return;
                    }
                    classToggleWrap.style.display = 'flex';
                    classToggleEl.innerHTML = allowedClasses.map(c => `
                        <button class="class-tab ${String(c) === String(currentClass) ? 'active' : ''}" data-class="${c}">வகுப்பு ${c}</button>
                    `).join('');
                    
                    classToggleEl.querySelectorAll('button').forEach(btn => {
                        btn.onclick = () => selectClass(btn.dataset.class);
                    });
                };

                const selectClass = (c, isPop = false) => {
                    currentClass = c;
                    titleEl.innerText = titles[subject] || subject;
                    setupTabs();
                    renderLessons();
                    
                    if (!isPop) {
                        const url = new URL(window.location);
                        url.searchParams.set('class', c);
                        window.history.pushState({ class: c }, '', url);
                    }
                };

                window.addEventListener('popstate', (e) => {
                    if (e.state && e.state.class) {
                        selectClass(e.state.class, true);
                    }
                });

                window.toggleAccordion = (card) => {
                    const isExpanded = card.classList.contains('expanded');
                    const isDesktop = window.innerWidth > 640;

                    if (isDesktop) {
                        const cardTop = card.offsetTop;
                        const rowCards = Array.from(document.querySelectorAll('.topic-card')).filter(c => c.offsetTop === cardTop);

                        // Close all cards from other rows
                        document.querySelectorAll('.topic-card.expanded').forEach(c => {
                            if (c.offsetTop !== cardTop) c.classList.remove('expanded');
                        });

                        // Toggle the whole row
                        const shouldExpand = !isExpanded;
                        rowCards.forEach(c => {
                            if (shouldExpand) c.classList.add('expanded');
                            else c.classList.remove('expanded');
                        });
                    } else {
                        // Standard behavior for mobile: close others, toggle selected
                        document.querySelectorAll('.topic-card.expanded').forEach(c => {
                            if (c !== card) c.classList.remove('expanded');
                        });
                        card.classList.toggle('expanded');
                    }
                };

                window.selectClass = selectClass; // Export to global for grid clicks

                // INITIALIZATION — directly load first class, no grid screen
                if (urlClass && allowedClasses.includes(urlClass)) {
                    selectClass(urlClass, true); // Don't pushState for initial page load
                } else {
                    selectClass(allowedClasses[0], true);
                }

            } catch (err) {
                console.error("PAGE ERROR:", err);
                const container = document.getElementById('syllabusContainer');
                if (container) container.innerHTML = `<div style="padding:4rem;text-align:center;color:red;">Error loading syllabus. Please refresh. <br><small>${err.message}</small></div>`;
            }
        })();
    </script>
</body>
</html>
