    <script type="module">
        (async () => {
            const { APP_VERSION } = await import(`./js/version.js?v=${Date.now()}`);
            const v = APP_VERSION;
            const { getLocalLessonData, formatText } = await import(`./js/fetchData.js?v=${v}`);

            const themes = {
                "science": { header: "SCIENCE | அறிவியல்", primary: "#1e3a8a", secondary: "#10b981", bg: "#f0f9ff", requiresMath: true },
                "maths": { header: "MATHEMATICS | கணிதம்", primary: "#0284c7", secondary: "#4f46e5", bg: "#f0f9ff", requiresMath: true },
                "social": { header: "SOCIAL SCIENCE | சமூக அறிவியல்", primary: "#e11d48", secondary: "#be123c", bg: "#fff1f2", requiresMath: false },
                "tamil": { header: "TAMIL | தமிழ்", primary: "#9f1239", secondary: "#fda4af", bg: "#fff1f2", requiresMath: false },
                "english": { header: "ENGLISH | ஆங்கிலம்", primary: "#6d28d9", secondary: "#8b5cf6", bg: "#f5f3ff", requiresMath: false },
                "psychology": { header: "PSYCHOLOGY | உளவியல்", primary: "#b45309", secondary: "#f59e0b", bg: "#fffbeb", requiresMath: false },
                "default": { header: "ONLINE COACHING", primary: "#1e3a8a", secondary: "#0c4a6e", bg: "#f0f9ff", requiresMath: false }
            };

            let currentTheme = themes["default"];

            function applyTheme(subjectRaw) {
                let subjectKey = (subjectRaw || "").toLowerCase();

                if (subjectKey.includes('math')) subjectKey = 'maths';
                else if (subjectKey.includes('social')) subjectKey = 'social';
                else if (subjectKey.includes('science')) subjectKey = 'science';
                else if (subjectKey.includes('tamil')) subjectKey = 'tamil';
                else if (subjectKey.includes('english')) subjectKey = 'english';
                else if (subjectKey.includes('psy')) subjectKey = 'psychology';
                else subjectKey = 'default';

                if (!themes[subjectKey]) subjectKey = 'default';

                currentTheme = themes[subjectKey];

                // Apply CSS Variables
                document.documentElement.style.setProperty('--primary', currentTheme.primary);
                document.documentElement.style.setProperty('--secondary', currentTheme.secondary);
                document.documentElement.style.setProperty('--bg', currentTheme.bg);

                // Set Header
                document.title = currentTheme.header + " - A1 Coaching Center";

                // Load MathJax if required
                if (currentTheme.requiresMath) {
                    const script = document.createElement('script');
                    script.id = "MathJax-script";
                    script.async = true;
                    script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";
                    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
                    document.head.appendChild(script);
                }
            }

            window.printMaterial = function () {
                const title = document.getElementById('lessonTitle').innerText;
                const content = document.getElementById('contentArea').innerHTML;
                const params = new URLSearchParams(window.location.search);
                const subject = params.get('subject') || 'default';

                // Robust PDF download for Psychology (especially for mobile)
                if (subject.includes('psy')) {
                    const element = document.createElement('div');
                    element.innerHTML = `
                        <div style="padding: 40px; font-family: system-ui, -apple-system, sans-serif;">
                            <div style="text-align: center; border-bottom: 4px solid ${currentTheme.primary}; padding-bottom: 25px; margin-bottom: 40px;">
                                <img src="images/logo.png" style="height: 70px; margin-bottom: 15px;">
                                <h1 style="margin:0; color:${currentTheme.primary}; font-size: 24pt;">TAMIL NANBAN COACHING CENTER</h1>
                                <div style="font-weight:bold; font-size: 14pt; color:#444;">TNPSC / TET - COACHING | 📞 6369371452</div>
                                <h2 style="margin-top:20px; font-size: 18pt; background: #f1f5f9; padding: 10px 20px; border-radius: 50px; display: inline-block;">${title}</h2>
                            </div>
                            <div class="${document.body.classList.contains('premium-ui') ? 'premium-ui' : ''}">${content}</div>
                            <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-35deg); opacity: 0.1; font-size: 60pt; font-weight: 900; color: #000; z-index: 9999; pointer-events: none; white-space: nowrap;">TAMIL NANBAN</div>
                        </div>
                    `;

                    // Style injection for PDF
                    const styles = Array.from(document.querySelectorAll('style')).map(s => s.innerHTML).join('\n');
                    const styleTag = document.createElement('style');
                    styleTag.innerHTML = styles + `
                        .lang-toggle { display: none !important; }
                        .pm-q-box { page-break-inside: avoid; border-left: 8px solid #2563eb !important; }
                        .info-box { page-break-inside: avoid; }
                    `;
                    element.appendChild(styleTag);

                    const opt = {
                        margin: [10, 10],
                        filename: `${title.replace(/\s+/g, '_')}.pdf`,
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    // Loading indicator for download
                    const btn = document.querySelector('.print-btn');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = `<span style="font-size: 0.8rem;">PDF...</span>`;
                    
                    html2pdf().set(opt).from(element).save().then(() => {
                        btn.innerHTML = originalHTML;
                    }).catch(err => {
                        console.error('PDF Error:', err);
                        btn.innerHTML = originalHTML;
                        alert('PDF பதிவிறக்கம் செய்வதில் பிழை ஏற்பட்டது. தயவுசெய்து மீண்டும் முயற்சிக்கவும்.');
                    });
                    
                    return;
                }

                // Default print window for other subjects
                const pw = window.open('', '_blank');

                const mathJaxScript = currentTheme.requiresMath ? `
                    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"><\/script>
                    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
                    <script>
                        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\\\(', '\\\\)']] } };
                    <\/script>
                ` : '';

                const isPremiumLayout = document.body.classList.contains('premium-ui');

                pw.document.write(`<html><head><title>${title}</title>
                    ${mathJaxScript}
                    <style>
                    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; line-height: 1.6; background: #fff; }
                    .p-header { text-align: center; border-bottom: 4px solid ${currentTheme.primary}; padding-bottom: 25px; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
                    .p-logo { height: 70px; margin-bottom: 5px; }
                    .p-header h1 { margin:0; color:${currentTheme.primary}; font-size: 26pt; font-weight: 900; }
                    .p-header .subtitle { font-weight:bold; font-size: 15pt; color:#444; }
                    .p-header h2 { margin-top:20px; font-size: 20pt; color:#222; background: #f1f5f9; padding: 10px 20px; border-radius: 50px; display: inline-block; }
                    
                    /* Watermark */
                    .pdf-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-35deg); opacity: 0.05; pointer-events: none; width: 80%; z-index: -1000; }
                    
                    .section-header { color: ${currentTheme.primary}; border-bottom: 2px solid #eee; margin-top: 40px; font-size: 18pt; font-weight: 800; padding-bottom: 5px; }
                    .section-body { font-size: 14pt; line-height: 1.8; color: #111; text-align: justify; }
                    .info-box { background: #fdfcf6; border-left: 6px solid #f59e0b; padding: 20px; margin: 25px 0; border-radius: 12px; }
                    .qa-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 15px; border-radius: 12px; page-break-inside: avoid; }
                    .qa-q { font-weight: bold; color: ${currentTheme.primary}; margin-bottom: 8px; font-size: 13pt; }
                    
                    /* Premium UI Support in PDF */
                    .pm-q-box { 
                        background: #ffffff; 
                        border: 1px solid #e2e8f0; 
                        border-left: 8px solid #2563eb; 
                        padding: 25px; 
                        margin: 30px 0; 
                        border-radius: 15px; 
                        page-break-inside: avoid;
                    }
                    .pm-question { color: #1e3a8a; font-weight: 800; font-size: 15pt; margin-bottom: 15px; }
                    .pm-answer { 
                        background: #fff1f2; 
                        color: #db2777; 
                        font-weight: 800; 
                        padding: 10px 20px; 
                        border-radius: 10px; 
                        border: 1px solid #fbcfe8; 
                        display: inline-block; 
                        margin-top: 15px; 
                    }
                    .pm-explanation { 
                        background: #fffbeb; 
                        color: #92400e; 
                        border-left: 5px solid #f59e0b; 
                        padding: 15px; 
                        margin-top: 15px; 
                        border-radius: 8px; 
                        font-size: 12pt; 
                        border: 1px solid #fef3c7;
                    }
                    
                    .keyword { color: #db2777; font-weight: 800; }
                    .en-text { font-weight: bold; }
                </style></head><body>
                    <img src="images/logo.png" class="pdf-watermark">
                    <div class="p-header">
                        <img src="images/logo.png" class="p-logo">
                        <h1>TAMIL NANBAN COACHING CENTER</h1>
                        <div class="subtitle">TNPSC / TET - COACHING | 📞 6369371452</div>
                        <h2>${title}</h2>
                    </div>
                    <div class="${isPremiumLayout ? 'premium-ui' : ''}">${content}</div>
                    <script>
                        window.onload = () => { 
                            Promise.all([
                                document.fonts.ready,
                                window.MathJax ? window.MathJax.typesetPromise() : Promise.resolve()
                            ]).then(() => {
                                setTimeout(() => {
                                    window.print();
                                    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
                                    if (!isMobile) { setTimeout(() => { window.close(); }, 1500); }
                                }, 500);
                            }).catch(() => {
                                window.print();
                            });
                        };
                    <\/script>
                </body></html>`);
                pw.document.close();
            };

            let currentLang = 'en'; // Default language

            async function init() {
                const params = new URLSearchParams(window.location.search);
                const subject = params.get('subject') || 'default';
                const className = params.get('class');
                const lessonId = params.get('lesson');

                // Apply Premium UI for Mock Tests, Revision, specific prefixes, and 9/10 classes
                const isPremium = (lessonId && (lessonId.startsWith('rev_') || lessonId.startsWith('model_') || lessonId.startsWith('psy_') || lessonId.startsWith('mt_'))) ||
                    className === '9' || className === '10' ||
                    subject === 'mocktest' || subject === 'revision';

                if (isPremium) {
                    document.body.classList.add('premium-ui');
                }

                if (subject.includes('psy') || subject.includes('social')) {
                    document.body.classList.add('psychology-view');
                }

                applyTheme(subject);

                if (!lessonId) {
                    document.getElementById('contentArea').innerHTML = "பாடம் குறிப்பிடப்படவில்லை.";
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                try {
                    const result = await getLocalLessonData(subject, className, lessonId);

                    if (!result || !result.data) {
                        document.getElementById('contentArea').innerHTML = `
                            <div style="color:#64748b; text-align:center; padding:3rem 1rem; background:#f8fafc; border-radius:1rem; border:1px solid #e2e8f0; margin-top:2rem;">
                                <h3 style="margin-top:0;">பாடம் இன்னும் தயாராகவில்லை</h3>
                                <p style="font-weight:600;">தற்போது இந்த பாடத்திற்கான குறிப்புகள் பதிவேற்றம் செய்யப்படவில்லை.</p>
                                <p style="margin-bottom:0; opacity:0.8; font-size:0.9rem;">${lessonId} / ${className} / ${subject}</p>
                            </div>
                        `;
                        return;
                    }

                    const data = result.data;
                    const lessonContent = data.data || data;
                    const material = lessonContent.material || lessonContent;
                    const sections = material.sections || [];
                    const summary = material.summary || "";
                    
                    // Direct check in lessonContent
                    const isBilingual = lessonContent.isBilingual === true || material.isBilingual === true;

                    const displayTitle = (lessonContent.lesson_meta && lessonContent.lesson_meta.title) || lessonContent.title || lessonId;
                    const fullHeader = `${currentTheme.header} - ${displayTitle}`;
                    document.getElementById('lessonTitle').innerText = fullHeader;

                    function renderContent() {
                        let html = '';

                        // Add Toggle Buttons if Bilingual
                        if (isBilingual) {
                            html += `
                                <div class="lang-toggle">
                                    <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="window.switchLang('en')">ENGLISH</button>
                                    <button class="lang-btn ${currentLang === 'ta' ? 'active' : ''}" onclick="window.switchLang('ta')">தமிழ்</button>
                                </div>
                            `;
                        }

                        if (summary) {
                            html += `<div class="info-box">${formatText(summary)}</div>`;
                        }

                        html += sections.map(section => {
                            let contentHTML = '';
                            const title = section.title || "";
                            let content = section.content || [];

                            // Handle Bilingual Content
                            if (section.type === 'bilingual') {
                                content = section[currentLang] || section.en || [];
                            }

                            if (section.type === 'infobox' || section.type === 'exercise') {
                                const boxClass = section.type === 'exercise' ? 'qa-item' : 'info-box';
                                const contentArray = Array.isArray(content) ? content : [content];
                                contentHTML = `<div class="${boxClass}">${contentArray.map(c => `<p>${formatText(typeof c === 'object' ? (c.text || JSON.stringify(c)) : c)}</p>`).join('')}</div>`;
                            } else if (section.type === 'evaluation') {
                                const ed = section.evaluationData || {};
                                contentHTML = `<div style="background:#f8fafc; border:1px solid #e2e8f0; padding:1.5rem; border-radius:1rem;">
                                    ${ed.mcqs ? ed.mcqs.map((m, i) => `<div class="qa-item"><div class="qa-q">${i + 1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                    ${ed.fillBlanks ? ed.fillBlanks.map((m, i) => `<div class="qa-item"><div class="qa-q">${i + 1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                    ${ed.trueFalse ? ed.trueFalse.map((m, i) => `<div class="qa-item"><div class="qa-q">${i + 1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                </div>`;
                            } else {
                                const contentArray = Array.isArray(content) ? content : [content];
                                contentHTML = contentArray.map(item => {
                                    let textStr = typeof item === 'object' ? (item.text || JSON.stringify(item)) : item;
                                    
                                    if (document.body.classList.contains('premium-ui') && textStr.includes('**விடை:**')) {
                                        let modified = textStr
                                            .replace(/^\*\*(.*?)\*\*/m, '<div class="pm-question">**$1**</div>')
                                            .replace(/\n?\*\*விடை:\*\*(.*)/m, '<div class="pm-answer">**விடை:**$1</div>')
                                            .replace(/\n?\*\*விளக்கம்:\*\*(.*)/m, '<div class="pm-explanation">**விளக்கம்:**$1</div>');
                                        return `<div class="pm-q-box">${formatText(modified)}</div>`;
                                    }
                                    return `<p class="section-body">${formatText(textStr)}</p>`;
                                }).join('');
                            }

                            // Prepare text for TTS
                            const sectionTextData = Array.isArray(content) ? content : [content];
                            let rawTextForTTS = sectionTextData.map(c => typeof c === 'object' ? (c.text || JSON.stringify(c)) : c).join('. ');
                            rawTextForTTS = rawTextForTTS.replace(/<[^>]*>?/gm, ''); // basic html strip
                            
                            // Prevent quotes from breaking the inline onclick handler
                            const escapedTTS = rawTextForTTS.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                            return `<div><h2 class="section-header" style="display:flex; align-items:center;">
                                <span>${formatText(title)}</span>
                                <button onclick="playMaterialAudio('${escapedTTS}', this)" class="tts-btn" title="பாடக்குறிப்பைக் கேட்கவும்">🔊</button>
                            </h2>${contentHTML}</div>`;
                        }).join('');


                        document.getElementById('contentArea').innerHTML = html;
                        if (window.MathJax) window.MathJax.typesetPromise();
                    }

                    // Expose switchLang to global scope
                    window.switchLang = (lang) => {
                        currentLang = lang;
                        renderContent();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };

                    // Audio Player Initialization
                    if (lessonContent.audio || material.audio) {
                        const audioSrc = lessonContent.audio || material.audio;
                        const playerContainer = document.getElementById('audioPlayer');
                        const audioEl = document.getElementById('mainAudio');
                        const playPauseBtn = document.getElementById('playPauseBtn');
                        const playIcon = document.getElementById('playIcon');
                        const pauseIcon = document.getElementById('pauseIcon');
                        const progressBar = document.getElementById('progressBar');
                        const progressContainer = document.getElementById('progressBarContainer');
                        const currentTimeEl = document.getElementById('currentTime');
                        const totalDurationEl = document.getElementById('totalDuration');

                        playerContainer.style.display = 'block';
                        audioEl.src = audioSrc;

                        const formatTime = (time) => {
                            const min = Math.floor(time / 60);
                            const sec = Math.floor(time % 60);
                            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
                        };

                        playPauseBtn.onclick = () => {
                            if (audioEl.paused) {
                                audioEl.play();
                                playIcon.style.display = 'none';
                                pauseIcon.style.display = 'block';
                            } else {
                                audioEl.pause();
                                playIcon.style.display = 'block';
                                pauseIcon.style.display = 'none';
                            }
                        };

                        audioEl.ontimeupdate = () => {
                            const progress = (audioEl.currentTime / audioEl.duration) * 100;
                            progressBar.style.width = `${progress}%`;
                            currentTimeEl.innerText = formatTime(audioEl.currentTime);
                        };

                        audioEl.onloadedmetadata = () => {
                            totalDurationEl.innerText = formatTime(audioEl.duration);
                        };

                        progressContainer.onclick = (e) => {
                            const rect = progressContainer.getBoundingClientRect();
                            const pos = (e.clientX - rect.left) / rect.width;
                            audioEl.currentTime = pos * audioEl.duration;
                        };

                        audioEl.onended = () => {
                            playIcon.style.display = 'block';
                            pauseIcon.style.display = 'none';
                            progressBar.style.width = '0%';
                        };
                    }

                    renderContent();

                } catch (error) {
                    document.getElementById('contentArea').innerHTML = `
                    <div style="color:#e11d48; text-align:center; padding:3rem 1rem; background:#fff1f2; border-radius:1rem; border:1px solid #fecaca; margin-top:2rem;">
                        <h3 style="margin-top:0;">பாடம் லோடு ஆகவில்லை!</h3>
                        <p style="font-weight:700; color:#991b1b;">${error.message}</p>
                        <p style="margin-bottom:0; opacity:0.7; font-size:0.9rem;">தயவுசெய்து அட்மினைத் தொடர்பு கொள்ளவும்.</p>
                    </div>`;
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }

            // TTS Logic for Material
            let synth = window.speechSynthesis;
            let currentUtterance = null;
            let currentBtn = null;

            window.playMaterialAudio = (text, btnElement) => {
                if (synth.speaking) {
                    synth.cancel();
                    if (currentBtn === btnElement) {
                        currentBtn = null;
                        return; // Toggle off
                    }
                }

                currentBtn = btnElement;
                let processedText = text.replace(/_{2,}/g, ' Dash ');
                let currentUtterance = new SpeechSynthesisUtterance(processedText);
                currentUtterance.lang = 'ta-IN';
                currentUtterance.rate = 0.9;
                currentUtterance.pitch = 1.2;

                const setVoice = () => {
                    const voices = synth.getVoices();
                    const tamilVoice = voices.find(v => v.lang.includes('ta') && v.name.toLowerCase().includes('female'));
                    if (tamilVoice) {
                        currentUtterance.voice = tamilVoice;
                    } else {
                        const anyTamilVoice = voices.find(v => v.lang.includes('ta'));
                        if (anyTamilVoice) currentUtterance.voice = anyTamilVoice;
                    }
                };
                
                setVoice();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = setVoice;
                }

                currentUtterance.onend = () => {
                    currentBtn = null;
                };

                synth.speak(currentUtterance);
            };

            init();

        })();
    </script>
</body>

</html>
