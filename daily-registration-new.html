<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>தினசரி பதிவு - Tamil Nanban</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Tamil:wght@400;700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', 'Noto Sans Tamil', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .exam-info {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .exam-info h3 {
            font-size: 1.2rem;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        
        .exam-info p {
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 தினசரி பதிவு</h1>
            <p>இன்றைய தேர்வுக்கு பதிவு செய்யுங்கள்</p>
        </div>
        
        <div class="form-card">
            <div class="exam-info">
                <h3 id="examTitle">Loading...</h3>
                <p id="examDate">--</p>
            </div>
            
            <div id="messageBox"></div>
            
            <div id="loadingBox" class="loading">
                <div class="spinner"></div>
                <p>பதிவு செய்யப்படுகிறது...</p>
            </div>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label for="phoneNumber">📱 மொபைல் எண் *</label>
                    <input type="tel" id="phoneNumber" maxlength="10" pattern="[0-9]{10}" required placeholder="10 இலக்கங்கள்">
                </div>
                
                <div class="form-group">
                    <label for="studentName">👤 மாணவர் பெயர் (Initial உடன்) *</label>
                    <input type="text" id="studentName" required placeholder="M.KANNAN">
                </div>
                
                <div class="form-group">
                    <label for="dateOfBirth">🎂 பிறந்த தேதி *</label>
                    <input type="date" id="dateOfBirth" required>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">
                    பதிவு செய் & தேர்வை தொடங்கு
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-init.js';
        import { collection, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { EXAM_SCHEDULE } from './js/exam-config.js';
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category');
        const examDate = urlParams.get('date');
        const dayNumber = urlParams.get('day');
        
        // Display exam info
        const todayExam = EXAM_SCHEDULE.getTodayExam();
        if (todayExam) {
            document.getElementById('examTitle').textContent = todayExam.examTitle;
            document.getElementById('examDate').textContent = todayExam.examDate;
        }
        
        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            const dateOfBirth = document.getElementById('dateOfBirth').value;
            
            // Validation
            if (phoneNumber.length !== 10) {
                showMessage('தயவுசெய்து சரியான 10 இலக்க மொபைல் எண்ணை உள்ளிடவும்', 'error');
                return;
            }
            
            if (studentName.length < 2) {
                showMessage('தயவுசெய்து சரியான பெயரை உள்ளிடவும்', 'error');
                return;
            }
            
            // Show loading
            showLoading(true);
            
            try {
                // Check if already registered today
                const regRef = doc(db, 'exam_registrations', `${phoneNumber}_${examDate}`);
                const regSnap = await getDoc(regRef);
                
                if (regSnap.exists() && regSnap.data().hasAttempted) {
                    showMessage('நீங்கள் ஏற்கனவே இன்றைய தேர்வை எழுதிவிட்டீர்கள்!', 'error');
                    showLoading(false);
                    return;
                }
                
                // Save student info
                await setDoc(doc(db, 'students', phoneNumber), {
                    phoneNumber,
                    studentName,
                    dateOfBirth,
                    registeredAt: new Date().toISOString()
                });
                
                // Save registration
                await setDoc(regRef, {
                    phoneNumber,
                    studentName,
                    category,
                    examDate,
                    dayNumber: parseInt(dayNumber),
                    hasAttempted: false,
                    registeredAt: new Date().toISOString()
                });
                
                showMessage('✅ பதிவு வெற்றி! தேர்வு page திறக்கப்படுகிறது...', 'success');
                
                // Redirect to quiz page after 2 seconds
                setTimeout(() => {
                    window.location.href = `quiz.html?phone=${phoneNumber}&date=${examDate}&category=${category}`;
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('பதிவு தோல்வி! மீண்டும் முயற்சிக்கவும்.', 'error');
                showLoading(false);
            }
        });
        
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerHTML = `<div class="message ${type}">${text}</div>`;
        }
        
        function showLoading(show) {
            document.getElementById('loadingBox').style.display = show ? 'block' : 'none';
            document.getElementById('submitBtn').disabled = show;
        }
    </script>
</body>
</html>
