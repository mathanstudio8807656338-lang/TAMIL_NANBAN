    <script type="module">
        (async () => {
            const {APP_VERSION} = await import(`./js/version.js?v=${Date.now()}`);
            const v = APP_VERSION;
            const {checkAuth, waitForAuth} = await import(`./js/auth.js?v=${v}`);
            const {getLocalLessonData} = await import(`./js/fetchData.js?v=${v}`);

            // 🆓 Free exam mode-ல் auth check skip (registration form-ல் mobile போதும்)
            // 🎬 Demo mode-ல்லும் skip (first lesson free preview)
            const __urlParams467 = new URLSearchParams(window.location.search);
            const _freeExamMode = __urlParams467.get('mode') === 'free' || !!__urlParams467.get('exam');
            const _isDemoMode = new URLSearchParams(window.location.search).get('demo') === '1';
            if (!_freeExamMode && !_isDemoMode) {
                checkAuth();
            } else {
                console.log(_freeExamMode ? '🆓 Free Exam Mode: auth check skipped' : '🎬 Demo Mode: auth check skipped');
            }

            const params = new URLSearchParams(window.location.search);
            const subject = params.get('subject');
            const className = params.get('class');
            const lessonId = params.get('lesson');
// ========== FREE EXAM SUPPORT ==========
        // Inline FreeExamLoader class
        // ✅ Universal Format Support: எந்த JSON format வந்தாலும் auto-read செய்யும்
        if (!window.FreeExamLoader) {
            class FreeExamLoader {
                constructor() {
                    this.examFolder = 'json-db/free-exams/';
                    this.availableExams = [];
                }

                // ✅ Array format → sections format
                // எந்த key format வந்தாலும் (English / Tamil / Mixed) படிக்கும்
                _convertArrayFormat(arr) {
                    const subjectMap = {};
                    arr.forEach(q => {
                        // Subject: Tamil or English key
                        const subject = q['பாடம்'] || q.Subject || q.subject || q.category || 'பொது';

                        // Question text
                        const question = q['கேள்வி'] || q.Question || q.question || q.Q || '';

                        // Options - Tamil keys (Option_A) or English keys (Option A / optionA)
                        const optA = q['Option_A'] || q['Option A'] || q.optionA || q.A || '';
                        const optB = q['Option_B'] || q['Option B'] || q.optionB || q.B || '';
                        const optC = q['Option_C'] || q['Option C'] || q.optionC || q.C || '';
                        const optD = q['Option_D'] || q['Option D'] || q.optionD || q.D || '';

                        // Answer - Tamil key (சரியான_விடை) or English
                        const rawAns = q['சரியான_விடை'] || q.Answer || q.answer || q.correct || 'A';

                        // Explanation - Tamil key (விளக்கம்) or English
                        const explanation = q['விளக்கம்'] || q.Explanation || q.explanation || q.exp || '';

                        // Topic
                        const topic = q['பாட_தலைப்பு'] || q['வினா_இடம்பெறும்_பகுதி'] || q.Topic || q.topic || '';

                        if (!subjectMap[subject]) subjectMap[subject] = [];
                        subjectMap[subject].push({
                            question: question,
                            options: { a: optA, b: optB, c: optC, d: optD },
                            answer: rawAns.toString().toLowerCase().trim(),
                            explanation: explanation,
                            difficulty: q.difficulty || 'medium',
                            topic: topic
                        });
                    });
                    return {
                        title: 'இலவச தேர்வு',
                        paper_type: 'free',
                        total_questions: arr.length,
                        sections: Object.keys(subjectMap).map(s => ({ subject: s, questions: subjectMap[s] }))
                    };
                }

                // எந்த format வந்தாலும் sections format-ஆக மாற்றும்
                _normalizeExamData(examData) {
                    // Format 1: Already has sections
                    if (examData && examData.sections && Array.isArray(examData.sections)) return examData;
                    // Format 2: Array [ {Question, Option A, Answer} ]
                    if (Array.isArray(examData)) return this._convertArrayFormat(examData);
                    // Format 3: { questions: [...] }
                    if (examData && examData.questions && Array.isArray(examData.questions)) {
                        const c = this._convertArrayFormat(examData.questions);
                        return { ...c, title: examData.title || c.title, paper_type: examData.paper_type || 'free', total_questions: examData.total_questions || examData.questions.length };
                    }
                    // Unknown format
                    console.warn('⚠️ Unknown JSON format');
                    return { title: 'தேர்வு', paper_type: 'free', total_questions: 0, sections: [] };
                }

                async loadAvailableExams() {
                    try {
                        const possiblePapers = ['paper1.json', 'paper2.json'];
                        this.availableExams = [];
                        for (const paperFile of possiblePapers) {
                            try {
                                const response = await fetch(`${this.examFolder}${paperFile}`);
                                if (response.ok) {
                                    const examData = await response.json();
                                    const normalized = this._normalizeExamData(examData);
                                    this.availableExams.push({
                                        filename: paperFile,
                                        data: normalized,
                                        title: normalized.title,
                                        paperType: normalized.paper_type,
                                        totalQuestions: normalized.total_questions
                                    });
                                    console.log(`✅ Loaded: ${paperFile} (${normalized.total_questions} கேள்விகள்)`);
                                }
                            } catch (err) {
                                console.log(`⏭️ Skipped: ${paperFile}`);
                            }
                        }
                        return this.availableExams;
                    } catch (error) {
                        console.error('Error loading exams:', error);
                        return [];
                    }
                }

                async loadExam(filename) {
                    try {
                        const response = await fetch(`${this.examFolder}${filename}`);
                        if (!response.ok) throw new Error(`Failed to load ${filename}`);
                        const examData = await response.json();
                        const normalized = this._normalizeExamData(examData);
                        console.log(`✅ Exam loaded: ${filename} — ${normalized.total_questions} கேள்விகள்`);
                        return normalized;
                    } catch (error) {
                        console.error(`Error loading exam ${filename}:`, error);
                        return null;
                    }
                }

                getAllQuestions(examData) {
                    const allQuestions = [];
                    let questionNumber = 1;
                    if (!examData || !examData.sections) {
                        console.error('❌ examData.sections இல்லை!');
                        return [];
                    }
                    examData.sections.forEach(section => {
                        section.questions.forEach(q => {
                            allQuestions.push({
                                number: questionNumber++,
                                subject: section.subject,
                                question: q.question,
                                options: q.options,
                                correctAnswer: q.answer,
                                explanation: q.explanation || '',
                                difficulty: q.difficulty || 'medium'
                            });
                        });
                    });
                    return allQuestions;
                }

                shuffleQuestions(questions) {
                    const shuffled = [...questions];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    return shuffled;
                }
            }
            window.FreeExamLoader = FreeExamLoader;
        }

        const isFreeExam = params.get('mode') === 'free' || !!params.get('exam');
        const examFile = params.get('examFile') || params.get('exam');

        // 🧪 TEST MODE detection
        //   ?test=1        → exam time gate bypass, but saves as REAL entry (isTestMode: false)
        //   ?test=1&mock=1 → bypass + marks isTestMode: true (admin generate skips it)
        const TEST_MODE = params.get('test') === '1';
        const MOCK_MODE = params.get('mock') === '1';
        if (TEST_MODE) {
            console.log('%c🧪 TEST MODE (time gate bypassed)', 'background:#f59e0b;color:white;font-size:14px;padding:6px;font-weight:bold;');
            if (MOCK_MODE) {
                window.IS_TEST_MODE = true;   // pure mock — will be skipped by admin
                console.log('%c⚠️ MOCK DATA — admin generate will skip this', 'background:#dc2626;color:white;font-size:13px;padding:5px;');
            } else {
                window.IS_TEST_MODE = false;  // real entry, shows in results
                console.log('%c✅ Saved as REAL entry (visible in results)', 'background:#059669;color:white;font-size:13px;padding:5px;');
            }
        }

        // 🔧 Shared variables (free exam & regular quiz இரண்டுக்கும் use ஆகுது)
        let questions = [];
        let answers = {};
        let currentIdx = 0;
        let resultsRevealed = false;

        // ═══════════════════════════════════════════════════════════
        // 🆕 Registration Form Function — phone, name, DOB, category
        // ═══════════════════════════════════════════════════════════
        window.showFreeExamRegistrationForm = function(examFile) {
            // Hide loader
            const loader = document.getElementById('quizLoader');
            if (loader) loader.style.display = 'none';

            // Build the form HTML
            const formHtml = `
              <div id="freeExamRegOverlay" style="
                position:fixed; inset:0; z-index:9999;
                background:rgba(15,23,42,.92); backdrop-filter:blur(8px);
                display:flex; align-items:center; justify-content:center;
                padding:1rem; overflow-y:auto; font-family:'Noto Sans Tamil', sans-serif;">
                <div style="
                  background:white; padding:2rem; border-radius:16px;
                  width:100%; max-width:440px;
                  box-shadow:0 25px 60px rgba(0,0,0,.4);">
                  <h2 style="margin:0 0 .25rem; color:#dc2626; font-weight:800; font-size:1.5rem;">
                    இலவச தேர்வு பதிவு
                  </h2>
                  <p style="color:#64748b; font-size:.85rem; margin:0 0 1.25rem;">
                    Free Exam Registration · ${(examFile.replace(/\.json$/i,'').replace(/paper(\d+)/i, 'Paper $1').replace(/_/g,' '))}
                  </p>

                  <div style="margin-bottom:1rem;">
                    <label style="display:block; font-weight:700; font-size:.8rem; color:#475569; margin-bottom:.35rem;">முழுப் பெயர் / Full Name *</label>
                    <input id="regName" type="text" maxlength="80" style="width:100%; padding:.7rem .85rem; border:1.5px solid #cbd5e1; border-radius:8px; font-size:1rem; font-family:inherit; box-sizing:border-box;">
                  </div>

                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem;">
                    <div>
                      <label style="display:block; font-weight:700; font-size:.8rem; color:#475569; margin-bottom:.35rem;">மொபைல் / Mobile *</label>
                      <input id="regPhone" type="tel" inputmode="numeric" maxlength="10" style="width:100%; padding:.7rem .85rem; border:1.5px solid #cbd5e1; border-radius:8px; font-size:1rem; font-family:inherit; box-sizing:border-box;">
                    </div>
                    <div>
                      <label style="display:block; font-weight:700; font-size:.8rem; color:#475569; margin-bottom:.35rem;">பிறந்த தேதி / DOB *</label>
                      <input id="regDob" type="text" inputmode="numeric" maxlength="10" placeholder="DD/MM/YYYY" style="width:100%; padding:.7rem .85rem; border:1.5px solid #cbd5e1; border-radius:8px; font-size:1rem; font-family:inherit; box-sizing:border-box; letter-spacing:1px;">
                    </div>
                  </div>

                  <div style="margin-bottom:1.25rem;">
                    <label style="display:block; font-weight:700; font-size:.8rem; color:#475569; margin-bottom:.35rem;">இனப்பிரிவு / Community *</label>
                    <select id="regCat" style="width:100%; padding:.7rem .85rem; border:1.5px solid #cbd5e1; border-radius:8px; font-size:1rem; font-family:inherit; box-sizing:border-box; background:white;">
                      <option value="">— தேர்ந்தெடுக்கவும் —</option>
                      <option value="OC">OC / General</option>
                      <option value="BC">BC</option>
                      <option value="BCM">BCM</option>
                      <option value="MBC">MBC</option>
                      <option value="DNC">DNC</option>
                      <option value="SC">SC</option>
                      <option value="SCA">SCA</option>
                      <option value="ST">ST</option>
                      <option value="PWD">PWD</option>
                    </select>
                  </div>

                  <div id="regErr" style="color:#dc2626; font-size:.85rem; font-weight:600; min-height:1.2em; margin-bottom:.5rem;"></div>

                  <button id="regSubmitBtn" style="
                    width:100%; padding:.9rem; background:#dc2626; color:white;
                    border:none; border-radius:8px; font-family:inherit;
                    font-weight:800; font-size:1rem; cursor:pointer;">
                    தேர்வைத் தொடங்கு (START EXAM)
                  </button>
                </div>
              </div>
            `;
            document.body.insertAdjacentHTML('beforeend', formHtml);

            // ✅ DOB auto-format DD/MM/YYYY
            (function() {
                const dobInput = document.getElementById('regDob');
                if (!dobInput) return;
                dobInput.addEventListener('input', function(e) {
                    let v = e.target.value.replace(/\D/g, '');
                    if (v.length > 8) v = v.slice(0, 8);
                    let result = '';
                    if (v.length >= 1) result = v.slice(0, 2);
                    if (v.length >= 3) result += '/' + v.slice(2, 4);
                    if (v.length >= 5) result += '/' + v.slice(4, 8);
                    e.target.value = result;
                });
                dobInput.addEventListener('blur', function() {
                    const val = dobInput.value.trim();
                    if (/^\d{2}\/\d{2}\/\d{4}$/.test(val)) {
                        const [dd, mm, yyyy] = val.split('/');
                        dobInput.dataset.isoDate = yyyy + '-' + mm + '-' + dd;
                    }
                });
            })();

            // Always empty form (no auto-fill from previous registration)

            // Submit handler
            document.getElementById('regSubmitBtn').onclick = function() {
                const name  = document.getElementById('regName').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const dobEl = document.getElementById('regDob');
                const dob = dobEl.dataset.isoDate || dobEl.value.trim();
                const cat   = document.getElementById('regCat').value.trim();
                const err   = document.getElementById('regErr');

                if (!name)                       { err.textContent = 'பெயரை உள்ளிடவும்'; return; }
                if (!/^\d{10}$/.test(phone))    { err.textContent = '10 இலக்க மொபைல் எண் தேவை'; return; }
                if (!dob)                        { err.textContent = 'பிறந்த தேதி தேவை'; return; }
                if (!cat)                        { err.textContent = 'இனப்பிரிவைத் தேர்ந்தெடுக்கவும்'; return; }

                // Save to localStorage for backup
                try {
                    localStorage.setItem('studentMobile',   phone);
                    localStorage.setItem('studentName',     name);
                    localStorage.setItem('studentCategory', cat);
                    localStorage.setItem('studentDob',      dob);
                    localStorage.setItem('attemptTs',       String(Date.now()));
                } catch (_) {}

                // 🆕 Save registration to Firebase device_sessions (so admin attendance picks it up)
                try {
                    const examDate = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
                    const ts = Date.now();
                    const safePhone = phone.replace(/[^0-9]/g, '');
                    const paperKey = examFile.replace(/\.json$/i, '').toLowerCase();
                    const sessionKey = `${safePhone}_${examDate}_${paperKey}_${ts}`;
                    const regRecord = {
                        mobile:       phone,
                        name:         name,
                        dob:          dob,
                        category:     cat,
                        examFile:     examFile,
                        examDate:     examDate,
                        attemptTs:    ts,
                        registeredAt: new Date().toISOString()
                    };
                    let db = window._freeExamDB;
                    if (!db && typeof firebase !== 'undefined') {
                        try { db = firebase.app('free-exam-app').database(); } catch (_) {}
                    }
                    if (db) {
                        db.ref(`device_sessions/${sessionKey}`).set(regRecord)
                          .catch(e => console.warn('Registration save failed (non-blocking):', e));
                    }
                } catch (e) {
                    console.warn('Registration save error (non-blocking):', e);
                }

                // Redirect to same page with all params (so quiz loads properly)
                const examDate = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
                const ts = Date.now();
                const currentParams = new URLSearchParams(window.location.search);
                currentParams.set('mode',  'free');
                currentParams.set('phone', phone);
                currentParams.set('name',  encodeURIComponent(name));
                currentParams.set('cat',   encodeURIComponent(cat));
                currentParams.set('date',  examDate);
                currentParams.set('ts',    String(ts));
                // examFile may already be in URL as ?exam= — keep both for safety
                if (!currentParams.get('examFile')) currentParams.set('examFile', examFile);

                window.location.href = window.location.pathname + '?' + currentParams.toString();
            };

            // Enter key submits
            ['regName','regPhone','regDob','regCat'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('keydown', e => {
                    if (e.key === 'Enter') document.getElementById('regSubmitBtn').click();
                });
            });
        };

        if (isFreeExam && examFile) {
            console.log('🎯 Free Exam Mode!');

            // ═══════════════════════════════════════════════════════════
            // 🆕 REGISTRATION GATE — phone/name URL-ல் இல்லை என்றால் form காட்டு
            // ═══════════════════════════════════════════════════════════
            const _hasReg = params.get('phone') && params.get('name');
            if (!_hasReg) {
                console.log('📝 No registration in URL — showing registration form');
                window.showFreeExamRegistrationForm(examFile);
                return;  // exit — form-ஐ submit பண்ணினபின் page reload ஆகும்
            }
            
            (async () => {
                try {
                    
                    // Load exam
                    const loader = new window.FreeExamLoader();
                    const examData = await loader.loadExam(examFile);
                    
                    if (!examData) throw new Error('Exam not found');
                    
                    // Get questions
                    questions = loader.getAllQuestions(examData);
                    
                    console.log(`✅ ${questions.length} questions loaded`);
                    
                    // Update UI
                    document.getElementById('lessonTitle').innerHTML = examData.title;
                    document.getElementById('resultLessonName').innerHTML = examData.title;
                    document.getElementById('totalQNum').innerText = questions.length;
                    document.getElementById('quizLoader').style.display = 'none';
                    document.getElementById('quizApp').style.display = 'block';  // 🆓 Show quiz container
                    
                    // Render questions
                    const container = document.getElementById('questionContainer');  // ✅ FIXED: correct ID
                    container.innerHTML = '';
                    
                    questions.forEach((q, idx) => {
                        const qCard = document.createElement('div');
                        qCard.className = 'question-card';
                        qCard.innerHTML = `
                            <div class="question-text" style="color:#1d4ed8; font-weight:700; font-size:1.05rem; line-height:1.6; margin-bottom:1rem;">
                                <span style="opacity:0.6; font-size:0.85rem; margin-right:4px;">${idx + 1}.</span>
                                ${q.question}
                            </div>
                            <div class="options-grid" id="options-${idx}">
                                ${Object.values(q.options).map((opt, oIdx) => `
                                    <div class="option-item" onclick="handleSelect(${idx}, ${oIdx}, this)">
                                        ${opt}
                                    </div>
                                `).join('')}
                            </div>
                            ${q.explanation ? `
                                <div class="explanation-box" id="exp-${idx}" style="display:none;">
                                    <strong>விளக்கம்:</strong> ${q.explanation}
                                </div>
                            ` : ''}
                        `;
                        container.appendChild(qCard);
                    });
                    
                    window.quizStartTime = Date.now();
                    
                    // ═══════════════════════════════════════════════
                    // 🆓 FREE EXAM: handlers (handleSelect, submit)
                    // ═══════════════════════════════════════════════
                    
                    // Free exam answers: "A","B","C","D" — convert to index
                    window._feCorrectIdx = (q) => {
                        const ans = (q.correctAnswer || q.answer || '').toString().trim().toUpperCase();
                        if (ans.length === 1 && /^[A-D]$/.test(ans)) return ans.charCodeAt(0) - 65;
                        if (typeof q.correctAnswer === 'number') return q.correctAnswer;
                        return -1;
                    };
                    
                    // Option click → mark selection ONLY (real exam: no correct/wrong reveal)
                    window.handleSelect = (qIdx, oIdx, el) => {
                        if (resultsRevealed) return;
                        
                        const grid = document.getElementById(`options-${qIdx}`);
                        const items = grid.querySelectorAll('.option-item');
                        
                        // Clear previous selection in this question (allow changing answer)
                        items.forEach(it => it.classList.remove('selected'));
                        
                        // Mark this option as selected
                        answers[qIdx] = oIdx;
                        el.classList.add('selected');
                        // 🚫 NO correct/wrong highlight, NO explanation during exam
                    };
                    
                    // Language toggle (English / Tamil / Both)
                    window.toggleLang = (lang, btn) => {
                        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                        if (btn) btn.classList.add('active');
                        const body = document.body;
                        body.classList.remove('lang-en','lang-ta','lang-both');
                        body.classList.add('lang-' + lang);
                    };
                    
                    // Submit button — BULLETPROOF: Firebase save MUST complete before UI lets student leave
                    document.getElementById('finalSubmitBtn').onclick = async () => {
                        // ✅ Double-submit guard
                        if (resultsRevealed) return;
                        resultsRevealed = true;
                        const btn = document.getElementById('finalSubmitBtn');
                        if (btn) { btn.disabled = true; btn.textContent = '⏳ சமர்ப்பிக்கப்படுகிறது...'; }

                        // 🔒 CRITICAL FIX: Prevent student from closing browser during save
                        const _beforeUnloadHandler = (e) => {
                            e.preventDefault();
                            e.returnValue = 'உங்கள் முடிவு இன்னும் save ஆகவில்லை! தயவுசெய்து காத்திருக்கவும்.';
                            return e.returnValue;
                        };
                        window.addEventListener('beforeunload', _beforeUnloadHandler);

                        let score = 0, correctCount = 0, wrongCount = 0;
                        questions.forEach((q, idx) => {
                            const userIdx = answers[idx];
                            const correctIdx = window._feCorrectIdx(q);
                            if (userIdx !== undefined && correctIdx !== -1 && userIdx === correctIdx) {
                                score++; correctCount++;
                            } else if (userIdx !== undefined) {
                                wrongCount++;
                            }
                        });

                        const endTime = Date.now();
                        const timeTaken = Math.floor((endTime - (window.quizStartTime || endTime)) / 1000);
                        const pct = (score / questions.length) * 100;

                        // 🔒 CRITICAL FIX: Show "SAVING" loading UI FIRST — student MUST wait
                        const overlay = document.getElementById('overlay');
                        const resultView = document.getElementById('resultView');
                        const finalScore = document.getElementById('finalScore');
                        const resultMsg = document.getElementById('resultMsg');
                        if (overlay) overlay.style.display = 'block';
                        if (resultView) resultView.style.display = 'block';
                        const reviewBtn = document.getElementById('reviewAnswersBtn');
                        // reviewBtn shown after save succeeds
                        document.querySelectorAll('#resultView button').forEach(b => {
                            if (b.textContent.includes('மீண்டும்')) b.style.display = 'none';
                        });

                        // 🔒 CRITICAL FIX: Hide all navigation buttons until save completes
                        const goBtn = document.getElementById('goToResults');
                        if (goBtn) goBtn.style.display = 'none';  // hidden until save success
                        const backHomeBtn = document.getElementById('backHome');
                        if (backHomeBtn) backHomeBtn.style.pointerEvents = 'none';
                        const exitBtn = document.getElementById('exitQuizSticky');
                        if (exitBtn) exitBtn.style.pointerEvents = 'none';

                        const resultTitle = document.querySelector('#resultView h2');
                        if (resultTitle) resultTitle.innerText = '⏳ உங்கள் முடிவுகள் save ஆகின்றன...';
                        if (finalScore) finalScore.style.display = 'none';
                        const lessonNameEl = document.getElementById('resultLessonName');
                        if (lessonNameEl) lessonNameEl.style.display = 'none';
                        if (resultMsg) {
                            resultMsg.innerHTML = '<strong>⏳ தயவுசெய்து காத்திருக்கவும்...</strong><br>இந்த page-ஐ மூட வேண்டாம் / Back செய்ய வேண்டாம்.<br>உங்கள் பதில்கள் Firebase-ல் save ஆகின்றன.';
                            resultMsg.style.color = '#f59e0b';
                        }
                        window.scrollTo(0, 0);

                        // ═══════════════════════════════════════════════
                        // 🔥 Firebase Save — UI shows "saving" until this completes
                        // ═══════════════════════════════════════════════
                        let saveSucceeded = false;
                        let saveError = null;
                        try {
                            // URL param + localStorage fallback (private mode safe)
                            const phone = params.get('phone') || localStorage.getItem('studentMobile') || null;
                            // ✅ FIX: IST date (UTC date mismatch தவிர்க்க)
                            const date = params.get('date') || new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
                            const ts = params.get('ts') || localStorage.getItem('attemptTs') || Date.now();
                            const studentName = decodeURIComponent(params.get('name') || '') || localStorage.getItem('studentName') || 'Student';
                            const studentCategory = decodeURIComponent(params.get('cat') || '') || localStorage.getItem('studentCategory') || 'OC';
                            const examKey = examFile.replace('.json', '');

                            if (!phone) {
                                throw new Error('தொலைபேசி எண் கிடைக்கவில்லை! மீண்டும் Registration செய்யவும்.');
                            }

                            const deviceId = `${phone}_${date}_${examKey}_${ts}`;
                            const resultData = {
                                phoneNumber: phone,
                                studentName,
                                category: studentCategory,
                                examFile,
                                examDate: date,
                                score,
                                correctAnswers: correctCount,
                                wrongAnswers: wrongCount,
                                unanswered: questions.length - correctCount - wrongCount,
                                totalQuestions: questions.length,
                                percentage: parseFloat(pct.toFixed(2)),
                                timeTaken,
                                completedAt: new Date().toISOString(),
                                isTestMode: window.IS_TEST_MODE === true,
                                userAnswers: Object.fromEntries(Object.entries(answers).map(([k, v]) => [k, v]))
                            };

                            console.log('💾 Saving result:', { deviceId, phone, studentName, studentCategory, examKey, examDate: date });

                            // 🛡️ FALLBACK 1: Save full payload to localStorage IMMEDIATELY (offline backup)
                            try {
                                const localKey = `pending_save_${deviceId}`;
                                localStorage.setItem(localKey, JSON.stringify(resultData));
                                console.log('💾 Local backup saved:', localKey);
                            } catch (_) {}

                            // 🔧 Firebase DB — lazy re-init if not ready (handles ?mode=free missing edge case)
                            let db = window._freeExamDB || null;
                            if (!db) {
                                try { db = firebase.app('free-exam-app').database(); window._freeExamDB = db; } catch (_) {}
                            }
                            if (!db && typeof firebase !== 'undefined') {
                                // 🆕 EMERGENCY RE-INIT: if isFreeExamMode check failed on page load
                                try {
                                    const FREE_EXAM_APP_NAME = 'free-exam-app';
                                    const freeExamConfig = {
                                        apiKey: "AIzaSyBpkL8eZT0u5mnxCxmVZMmmemX15BCaNf4",
                                        authDomain: "a1-coaching.firebaseapp.com",
                                        databaseURL: "https://tamil-nanban-default-rtdb.asia-southeast1.firebasedatabase.app",
                                        projectId: "a1-coaching",
                                        storageBucket: "a1-coaching.firebasestorage.app",
                                        messagingSenderId: "240838259015",
                                        appId: "1:240838259015:web:a5b80f33e9a0fec5ea24b0"
                                    };
                                    const existing = firebase.apps.find(a => a.name === FREE_EXAM_APP_NAME);
                                    const app = existing || firebase.initializeApp(freeExamConfig, FREE_EXAM_APP_NAME);
                                    db = app.database();
                                    window._freeExamDB = db;
                                    console.log('🚨 Emergency Firebase re-init successful');
                                } catch (e) {
                                    console.error('Emergency re-init failed:', e);
                                }
                            }
                            if (!db) {
                                throw new Error('Firebase கிடைக்கவில்லை. Internet connection சரிபார்க்கவும்.');
                            }

                            // 🔁 5 முறை retry with exponential backoff — network resilience
                            const delays = [0, 1500, 3000, 5000, 8000];
                            let lastErr = null;
                            for (let attempt = 0; attempt < 5; attempt++) {
                                if (delays[attempt] > 0) await new Promise(r => setTimeout(r, delays[attempt]));
                                try {
                                    if (resultMsg) {
                                        resultMsg.innerHTML = `<strong>⏳ Save ஆகின்றது... (முயற்சி ${attempt + 1}/5)</strong><br>இந்த page-ஐ மூட வேண்டாம்.`;
                                    }
                                    await db.ref(`free_exam_results/${deviceId}`).set(resultData);
                                    saveSucceeded = true;
                                    console.log(`✅ Firebase save SUCCESS (attempt ${attempt + 1})`);
                                    // Cleanup local backup
                                    try { localStorage.removeItem(`pending_save_${deviceId}`); } catch (_) {}
                                    break;
                                } catch (retryErr) {
                                    lastErr = retryErr;
                                    console.warn(`⚠️ Save attempt ${attempt + 1} failed:`, retryErr.message);
                                }
                            }
                            if (!saveSucceeded) {
                                throw lastErr || new Error('5 முறை முயன்றும் save ஆகவில்லை.');
                            }

                        } catch (err) {
                            saveError = err;
                            console.error('❌ Save failed:', err);
                        }

                        // 🔓 NOW remove navigation guard — save attempt complete (success or fail)

            // Robust helper to get correct answer index across different question styles
            function getCorrectIdx(q) {
            const raw = q.answer !== undefined ? q.answer : q.a;
            if (raw === undefined) return -1;

            // If it's already an index (index-based protocol)
            if (typeof raw === 'number') return raw;

            const normAns = normalize(raw);

            // Try matching "Option A" style from English modules
            if (normAns.startsWith("Option ")) {
                const char = normAns.replace("Option ", "").trim().toUpperCase();
            const charIndex = char.charCodeAt(0) - 65; // A=0, B=1...
                if (charIndex >= 0 && charIndex < q.options.length) return charIndex;
            }

            // Try matching single letters "A", "B", "C", "D"
            if (normAns.length === 1 && /^[A-D]$/i.test(normAns)) {
                return normAns.toUpperCase().charCodeAt(0) - 65;
            }

            // Try exact text match (fallback for some protocols)
            const exactIdx = q.options.findIndex(opt => normalize(opt) === normAns);
            if (exactIdx !== -1) return exactIdx;

            // Try partial match (if option starts with the answer string, or vice-versa)
            const partialIdx = q.options.findIndex(opt => {
                const nOpt = normalize(opt);
            return nOpt.startsWith(normAns) || normAns.startsWith(nOpt);
            });
            if (partialIdx !== -1) return partialIdx;

            return -1;
        }

            function formatText(text) {
            if (!text) return "";
            let html = text.toString().replace(/\[\[(.*?)\]\]/g, '<span class="keyword-highlight">$1</span>');

            // Support '||' separator (New Standard)
            if (html.includes('||')) {
                const parts = html.split('||');
            return `<span class="en-text">${parts[0].trim()}</span><span class="lang-sep">||</span><span class="tm-text">${parts[1].trim()}</span>`;
            }

            // Support ' / ' or Parentheses (Old Fallback)
            if (html.includes(" / ")) {
                const parts = html.split(" / ");
            return `<span class="en-text">${parts[0].trim()}</span><span class="lang-sep">/</span><span class="tm-text">${parts[1].trim()}</span>`;
            }

            const tamilRegex = /[\u0b80-\u0bff]+/;
            if (tamilRegex.test(html) && /[a-zA-Z]/.test(html) && !html.includes('$')) {
                if (html.includes(" (") && html.includes(")")) {
                    const start = html.indexOf(" (");
            const end = html.indexOf(")", start); // Use first matching closing paren
            if (end !== -1) {
                        const before = html.substring(0, start).trim();
            const inside = html.substring(start + 1, end).trim();
            const after = html.substring(end + 1).trim();
            return `<span class="en-text">${before}</span><span class="tm-text"> ${inside}</span>${after ? ' ' + after : ''}`;
                    }
                }
            }
            return html;
        }

            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) { }

                    if (!isReadingAll) return;

                    // 4. Move to next question
                    setTimeout(() => {
                        if (isReadingAll) readNext(idx + 1);
                    }, 1200);
                });
            });
        }

        window.playQuizAudio = async (idx, type = 'question', callback) => {
            if (synth.speaking) synth.cancel();
            if (currentCloudAudio) {
                currentCloudAudio.pause();
            currentCloudAudio = null;
            }

            currentPlayingIdx = idx;
            const q = questions[idx];
            let textToRead = "";

            if (type === 'question') {
                textToRead = "கேள்வி " + (idx + 1) + ": " + (q.question || q.q) + ". ";
            } else if (type === 'answer') {
                const correctIdx = getCorrectIdx(q);
            const ansText = q.options[correctIdx] || "";
            textToRead = "சரியான விடை: " + ansText + ". ";
            } else if (type === 'explanation') {
                const expText = q.ex || (q.explanation || "");
            if (expText) {
                textToRead = "விளக்கம்: " + expText;
                } else {
                    if (callback) callback();
            return;
                }
            }

            textToRead = textToRead.replace(/<[^>]*>?/gm, '');
            textToRead = textToRead.replace(/\*/g, '');
            textToRead = textToRead.replace(/_{2,}/g, ' Dash ');

            try {
                const apiKey = 'AIzaSyDb2uAv_N_XkyteAeNGEpz8RyVgzIWoIs0';
            const url = `https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`;
                
                const requestBody = {
                    input: { text: textToRead },
                    voice: { languageCode: 'ta-IN', name: 'ta-IN-Wavenet-C' }, // High-quality female neural voice
                    audioConfig: { audioEncoding: 'MP3', speakingRate: 0.90, pitch: 0 } 
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    console.error("Google TTS Error, using fallback");
                    fallbackTTS(textToRead, callback);
                    return;
                }

                const data = await response.json();
                const audioSrc = "data:audio/mp3;base64," + data.audioContent;
                
                currentCloudAudio = new Audio(audioSrc);
                currentCloudAudio.onended = () => {
                    currentPlayingIdx = -1;
                    if (callback) callback();
                };
                currentCloudAudio.play();

            } catch (error) {
                console.error("TTS Fetch Error:", error);
                fallbackTTS(textToRead, callback);
            }
        };

        function fallbackTTS(text, callback) {
            let currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'ta-IN';
            currentUtterance.rate = 0.85; 
            currentUtterance.pitch = 1.0; 
            currentUtterance.onend = () => {
                currentPlayingIdx = -1;
                if (callback) callback();
            };
            synth.speak(currentUtterance);
        }

        // 🆓 Free exam mode-ல் login redirect skip
        // 🎬 Demo mode (?demo=1) — first lesson free preview, no login
        const _demoMode = new URLSearchParams(window.location.search).get('demo') === '1';
        if (_freeExamMode) {
            console.log('🆓 Free Exam Mode: skipping login redirect');
            // Free exam quiz already loaded by the earlier (return-ed) free exam block
        } else if (_demoMode) {
            console.log('🎬 Demo Mode: skipping login, loading quiz');
            checkEnglishSubject();
            initQuiz();
        } else {
            waitForAuth().then(user => {
                if (!user) { window.location.href = 'login.html'; return; }
                checkEnglishSubject();
                initQuiz();
            });
        }
        })();
    </script>
