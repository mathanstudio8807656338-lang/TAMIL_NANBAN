<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Tamil Nanban - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
/* --- BRAND HEADER --- */
.header-standard {
    background: #ffffff;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #1e3a8a;
    border-bottom: 1px solid #1e3a8a;
}
.brand-container {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.brand-main {
    font-family: 'Baloo Thambi 2', cursive;
    font-size: 1.8rem;
    font-weight: 800;
    color: #1e3a8a;
    line-height: 1.2;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}
.brand-sub {
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: #ef4444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: -2px;
}
@media (max-width: 480px) {
    .brand-main { font-size: 1.5rem; }
    .brand-sub { font-size: 0.65rem; }
    .header-standard { height: 60px; }
}

/* Bottom Nav */
.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 0.6rem 0.4rem;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 1000;
    border-top: 1px solid #f1f5f9;
}
.nav-item {
    text-decoration: none;
    color: #64748b;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 0.65rem;
    font-weight: 700;
    gap: 4px;
    flex: 1;
    transition: color 0.3s ease;
}
.nav-item.active { color: #1e3a8a; }
.nav-item.logout { color: #ef4444; }
.nav-icon { font-size: 1.2rem; margin-bottom: 2px; }

/* Global fixes */
body {
    padding-bottom: 80px;
}

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        #file-input {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: block;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }

        .logs {
            margin-top: 1.5rem;
            background: #000;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #10b981;
            height: 150px;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">Upload Grade 8 Tamil Lessons & Sync to Live</p>

        <form id="upload-form">
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div id="file-name">Click to select JSON file</div>
                <input type="file" id="file-input" accept=".json">
            </div>

            <button type="submit" class="btn" id="submit-btn">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Publish Lesson</span>
            </button>
        </form>

        <div id="status" class="status"></div>
        <div id="logs" class="logs"></div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const fileNameDiv = document.getElementById('file-name');
        const statusDiv = document.getElementById('status');
        const logsDiv = document.getElementById('logs');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btn-text');

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) {
                fileNameDiv.innerText = fileInput.files[0].name;
                fileNameDiv.style.color = 'var(--primary)';
                fileNameDiv.style.fontWeight = '600';
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert('Please select a file first!');
                return;
            }

            // UI State
            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.innerText = 'Syncing to GitHub...';
            statusDiv.style.display = 'none';
            logsDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('lesson', fileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    statusDiv.innerText = result.message;
                    statusDiv.className = 'status success';
                    logsDiv.innerText = result.logs;
                    logsDiv.style.display = 'block';
                } else {
                    statusDiv.innerText = 'Error: ' + result.message;
                    statusDiv.className = 'status error';
                }
            } catch (err) {
                statusDiv.innerText = 'Connection Error: ' + err.message;
                statusDiv.className = 'status error';
            } finally {
                statusDiv.style.display = 'block';
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Publish Lesson';
            }
        };
    </script>
        <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="subject.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>Course</span>
        </a>
        <a href="tel:6369371452" class="nav-item">
            <span class="nav-icon">📞</span>
            <span>Contact</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Pay</span>
        </a>
        <a href="#" onclick="window.logout(); return false;" class="nav-item logout">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </nav>
</body>
</html>
