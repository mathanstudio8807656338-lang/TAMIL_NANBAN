<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>தேர்வு முடிவுகள் - Tamil Nanban</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+Tamil:wght@400;600;700&family=Baloo+Thambi+2:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans Tamil', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 60px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; color: white; margin-bottom: 25px; }
        .header h1 {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 2.3rem;
            margin-bottom: 8px;
        }
        .header p { font-size: 1rem; opacity: 0.95; }
        
        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .control-row label {
            display: block;
            font-weight: 700;
            color: #334155;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        
        .control-row input, .control-row select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .control-row input:focus, .control-row select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-load {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }
        
        .error-msg {
            background: #fef2f2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        
        .results-section { display: none; }
        
        .stats-bar {
            background: white;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .stat .value { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; }
        .stat .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; }
        
        .toolbar {
            background: white;
            border-radius: 15px;
            padding: 14px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .toolbar input.search {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
        }
        .toolbar input.search:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-toggle {
            padding: 10px 16px;
            background: #f1f5f9;
            color: #475569;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-toggle.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .btn-pdf {
            padding: 10px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .table-wrap {
            background: white;
            border-radius: 15px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f1f5f9;
            padding: 12px 10px;
            text-align: left;
            font-weight: 700;
            color: #1e293b;
            position: sticky;
            top: 0;
            font-size: 0.8rem;
        }
        td {
            padding: 11px 10px;
            border-bottom: 1px solid #f1f5f9;
        }
        tr:hover { background: #fafbfc; }
        
        .rank-cell { font-weight: 800; text-align: center; }
        .rank-1 { color: #f59e0b; }
        .rank-2 { color: #94a3b8; }
        .rank-3 { color: #d97706; }
        
        .name-cell { font-weight: 600; color: #1e293b; }
        .phone-cell { color: #64748b; font-family: monospace; font-size: 0.85rem; }
        .score-cell { font-weight: 700; color: #10b981; text-align: center; }
        .pct-cell { color: #64748b; text-align: center; }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: white;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        
        .btn-back {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            border: 2px solid rgba(255,255,255,0.4);
        }
        
        @media (max-width: 600px) {
            .control-row { grid-template-columns: 1fr; }
            table { font-size: 0.82rem; }
            th, td { padding: 8px 6px; }
            .phone-cell { display: none; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 தேர்வு முடிவுகள்</h1>
            <p>இலவச தேர்வு - மாணவர்கள் முழு பட்டியல்</p>
        </div>
        
        <div class="control-panel">
            <div class="control-row">
                <div>
                    <label>📅 தேர்வு தேதி</label>
                    <input type="date" id="examDate">
                </div>
                <div>
                    <label>📄 தேர்வு பேப்பர்</label>
                    <select id="paperSelect">
                        <option value="paper1">📘 கணிதம் + அறிவியல்</option>
                        <option value="paper2">📗 சமூக அறிவியல்</option>
                    </select>
                </div>
            </div>
            <button class="btn-load" onclick="loadResults()">
                🔍 முடிவுகள் காண்பி
            </button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
        
        <div id="loadingBox" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>முடிவுகள் ஏற்றப்படுகின்றன...</p>
        </div>
        
        <div class="results-section" id="resultsSection">
            <div class="stats-bar">
                <div class="stat">
                    <div class="value" id="totalCount">0</div>
                    <div class="label">மொத்தம்</div>
                </div>
                <div class="stat">
                    <div class="value" id="topScore">0</div>
                    <div class="label">அதிக மதிப்பெண்</div>
                </div>
                <div class="stat">
                    <div class="value" id="avgScore">0</div>
                    <div class="label">சராசரி</div>
                </div>
                <div class="stat">
                    <div class="value" id="topperName" style="font-size:0.95rem;">—</div>
                    <div class="label">டாப்பர்</div>
                </div>
            </div>
            
            <div class="toolbar">
                <input type="text" class="search" id="searchInput" placeholder="🔍 பெயர் தேடு...">
                <button class="btn-toggle active" id="btnAZ" onclick="setSort('az')">A-Z</button>
                <button class="btn-toggle" id="btnRank" onclick="setSort('rank')">Rank வரிசை</button>
                <button class="btn-pdf" onclick="downloadPDF()">📥 PDF</button>
            </div>
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60px;text-align:center;">Rank</th>
                            <th>பெயர்</th>
                            <th class="phone-cell">மொபைல்</th>
                            <th style="width:80px;text-align:center;">மதிப்பெண்</th>
                            <th style="width:60px;text-align:center;">%</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
        
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">📭</div>
            <h3>இந்த தேதிக்கு முடிவுகள் இல்லை</h3>
            <p style="margin-top:8px;opacity:0.85;">தேர்வு முடிந்து 15 நிமிடம் கடந்த பிறகு முடிவுகள் தயாராகும்</p>
        </div>
        
        <div style="text-align:center;">
            <a href="index.html" class="btn-back">← முகப்புப் பக்கம்</a>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        let currentData = null;
        let currentSort = 'az';
        let currentSearch = '';
        
        // Smart default date: if after 10:15 PM today, use today; else yesterday
        const now = new Date();
        const isAfter1015pm = (now.getHours() > 22) || (now.getHours() === 22 && now.getMinutes() >= 15);
        const defaultDate = new Date();
        if (!isAfter1015pm) {
            defaultDate.setDate(defaultDate.getDate() - 1);
        }
        document.getElementById('examDate').value = defaultDate.toISOString().split('T')[0];
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        async function loadResults() {
            const examDate = document.getElementById('examDate').value;
            const paperKey = document.getElementById('paperSelect').value;
            
            if (!examDate) {
                showError('தேதியை தேர்ந்தெடுக்கவும்!');
                return;
            }
            
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('loadingBox').style.display = 'block';
            
            // 🚫 NO Firebase! Static JSON fetch
            const fileName = `${paperKey}_results_${examDate}.json`;
            const url = `results/${fileName}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`File not found (${response.status})`);
                }
                
                const data = await response.json();
                currentData = data;
                
                document.getElementById('loadingBox').style.display = 'none';
                
                if (!data.results || data.results.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }
                
                renderResults();
                
            } catch (err) {
                document.getElementById('loadingBox').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                console.warn('Load error:', err.message);
            }
        }
        
        function renderResults() {
            if (!currentData) return;
            
            const results = currentData.results;
            document.getElementById('totalCount').textContent = results.length;
            
            // Topper = rank 1
            const topper = results.find(r => r.rank === 1) || results[0];
            document.getElementById('topScore').textContent = topper?.score || 0;
            document.getElementById('topperName').textContent = topper?.name || '—';
            
            const avg = results.reduce((s, r) => s + r.score, 0) / results.length;
            document.getElementById('avgScore').textContent = avg.toFixed(1);
            
            // Filter
            let display = [...results];
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                display = display.filter(r => 
                    (r.name || '').toLowerCase().includes(q) ||
                    (r.phone || '').includes(q)
                );
            }
            
            // Sort
            if (currentSort === 'az') {
                display.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ta'));
            } else {
                display.sort((a, b) => a.rank - b.rank);
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = display.map(r => {
                const rankClass = r.rank === 1 ? 'rank-1' : r.rank === 2 ? 'rank-2' : r.rank === 3 ? 'rank-3' : '';
                const medal = r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : r.rank;
                const phoneMask = r.phone ? r.phone.slice(0,2) + '****' + r.phone.slice(-2) : '—';
                return `
                    <tr>
                        <td class="rank-cell ${rankClass}">${medal}</td>
                        <td class="name-cell">${r.name || 'மாணவர்'}</td>
                        <td class="phone-cell">${phoneMask}</td>
                        <td class="score-cell">${r.score}/${r.total}</td>
                        <td class="pct-cell">${(r.percentage || 0).toFixed(1)}%</td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('resultsSection').style.display = 'block';
        }
        
        function setSort(mode) {
            currentSort = mode;
            document.getElementById('btnAZ').classList.toggle('active', mode === 'az');
            document.getElementById('btnRank').classList.toggle('active', mode === 'rank');
            renderResults();
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.trim();
            renderResults();
        });
        
        function downloadPDF() {
            if (!currentData || !currentData.results.length) {
                alert('முதலில் முடிவுகளை load பண்ணுங்கள்');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text('Tamil Nanban - Free Exam Results', 105, 15, { align: 'center' });
            
            doc.setFontSize(11);
            doc.setFont(undefined, 'normal');
            const titleText = currentData.paper === 'paper1' 
                ? 'Paper 1: Mathematics + Science' 
                : 'Paper 2: Social Science';
            doc.text(titleText, 105, 22, { align: 'center' });
            doc.text(`Exam Date: ${currentData.examDate}`, 105, 28, { align: 'center' });
            doc.text(`Total Students: ${currentData.totalStudents}`, 105, 34, { align: 'center' });
            
            let pdfData = [...currentData.results];
            if (currentSort === 'az') {
                pdfData.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            } else {
                pdfData.sort((a, b) => a.rank - b.rank);
            }
            
            const tableData = pdfData.map(r => [
                r.rank,
                r.name || 'Student',
                r.phone ? r.phone.slice(0,2) + '****' + r.phone.slice(-2) : '—',
                `${r.score}/${r.total}`,
                `${(r.percentage || 0).toFixed(1)}%`
            ]);
            
            doc.autoTable({
                head: [['Rank', 'Name', 'Mobile', 'Score', '%']],
                body: tableData,
                startY: 40,
                styles: { fontSize: 9, cellPadding: 2 },
                headStyles: { fillColor: [102, 126, 234], textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [248, 250, 252] },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 18 },
                    1: { cellWidth: 70 },
                    2: { cellWidth: 35 },
                    3: { halign: 'center', cellWidth: 28 },
                    4: { halign: 'center', cellWidth: 20 }
                },
                didDrawPage: (data) => {
                    const pageCount = doc.internal.getNumberOfPages();
                    doc.setFontSize(8);
                    doc.text(
                        `Page ${data.pageNumber} / ${pageCount} — Generated: ${new Date().toLocaleString('en-IN')}`,
                        105, doc.internal.pageSize.height - 8, { align: 'center' }
                    );
                }
            });
            
            const sortLabel = currentSort === 'az' ? 'AZ' : 'Rank';
            const filename = `${currentData.paper}_results_${currentData.examDate}_${sortLabel}.pdf`;
            doc.save(filename);
        }
    </script>
</body>
</html>
